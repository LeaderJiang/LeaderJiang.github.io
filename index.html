<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leader Jiang</title>
    <meta
      name="description"
      content="Leader Jiang 的 GitHub Pages 首頁。"
    />
    <style>
      :root {
        color-scheme: light;
        --bg: #f4efe8;
        --panel: rgba(255, 251, 246, 0.82);
        --text: #1d1a17;
        --muted: #6d5c4f;
        --accent: #b6522c;
        --line: rgba(79, 54, 35, 0.12);
        --shadow: 0 24px 60px rgba(84, 56, 30, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Georgia, "Times New Roman", serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(255, 209, 153, 0.42), transparent 30%),
          linear-gradient(135deg, #faf5ed 0%, #efdfca 52%, #dbc3a0 100%);
      }

      main {
        width: min(860px, 100%);
        padding: 44px 32px;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--panel);
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
      }

      p {
        margin: 0;
        line-height: 1.75;
      }

      .eyebrow {
        margin-bottom: 14px;
        font-size: 0.78rem;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: var(--accent);
      }

      h1 {
        margin: 0 0 18px;
        font-size: clamp(3rem, 9vw, 5.5rem);
        line-height: 0.94;
      }

      .lead {
        max-width: 42rem;
        font-size: 1.06rem;
        color: var(--muted);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        margin-top: 30px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 148px;
        padding: 14px 20px;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 700;
      }

      .primary {
        color: #fffaf5;
        background: linear-gradient(135deg, var(--accent) 0%, #d27942 100%);
      }

      .secondary {
        color: var(--text);
        background: rgba(255, 255, 255, 0.7);
        box-shadow: inset 0 0 0 1px var(--line);
      }

      @media (max-width: 640px) {
        main {
          padding: 30px 22px;
          border-radius: 22px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">GitHub Pages</p>
      <h1>Leader Jiang</h1>
      <p class="lead">
        這個首頁已經部署在 `LeaderJiang.github.io` 倉庫，發布後會對應到根網址
        `https://leaderjiang.github.io/`。這個版本先作為驗證頁，確認連結與部署流程正確。
      </p>
      <div class="actions">
        <a class="primary" href="https://github.com/LeaderJiang">GitHub</a>
        <a class="secondary" href="mailto:leader@example.com">Contact</a>
      </div>
    </main>
  </body>
</html>
